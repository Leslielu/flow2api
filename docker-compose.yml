version: '3.8'

services:
  flow2api:
    build: .  # 使用当前目录的 Dockerfile 构建镜像
    image: flow2api:latest
    container_name: flow2api
    ports:
      - "38000:8000"
    volumes:
      - ./data:/app/data
      - ./tmp:/app/tmp
      - ./config/setting.toml:/app/config/setting.toml
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    command: ["python", "main.py"]
